<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aBest.co</title>
    <!-- Basic SEO tags -->
    <meta name="description" content="aBest.co - Premium Global Development and Real Estate.">
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        body {
            background-color: #0c0f14;
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #6b9cff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="loader"></div>
    <script>
        // Automatic Language Redirect
        document.addEventListener('DOMContentLoaded', function() {
            // Check if user has a saved language preference in localStorage
            var savedLang = localStorage.getItem('aBest_lang');
            
            if (savedLang) {
                window.location.replace('/' + savedLang + '/');
                return;
            }

            // Get browser language
            var userLang = navigator.language || navigator.userLanguage; 
            var langCode = userLang.split('-')[0].toLowerCase();
            
            var targetUrl = '/en/'; // Default
            
            if (langCode === 'de') {
                targetUrl = '/de/';
            } else if (langCode === 'es') {
                targetUrl = '/es/';
            } else if (langCode === 'tr') {
                targetUrl = '/tr/';
            }
            
            // Redirect smoothly
            window.location.replace(targetUrl);
        });
    </script>
</body>

</html>
