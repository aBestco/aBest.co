</div>

</div>
<div class="form-group">
<label for="email">אֶלֶקטרוֹנִי</label>
<input class="form-input" id="email" required="" type="email"/>
</div>
<div class="form-group">
<label for="message">הוֹדָעָה</label>
<textarea class="form-textarea" id="message" required="" style="resize: none; overflow: hidden; min-height: 120px;"></textarea>
</div>
<button class="glass-button ripple" style="width: 100%; padding: 14px; margin-top: 10px;" type="submit">שלח הודעה</button>
<div style="display:none;"><label>השאר שדה זה ריק</label><input id="honeypot" name="_honeypot" type="text"/></div>
