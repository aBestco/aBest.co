<p style="margin-bottom: 1rem;">نحن نرحب باستفسارات الشراكة والاستثمار. يرجى ملء

<form class="glass-form" id="contact-form" onsubmit="handleContactSubmit(event)">
<div class="form-row" style="display: flex; gap: 1rem;">
<div class="form-group" style="flex: 1;">
<label for="first_name">الاسم الأول</label>
<input class="form-input" id="first_name" required="" type="text"/>
</div>
<div class="form-group" style="flex: 1;">
<label for="last_name">اسم العائلة</label>
<input class="form-input" id="last_name" required="" type="text"/>
</div>
</div>
<div class="form-group">
<label for="phone">رقم الهاتف (اختياري)</label>
<input class="form-input" id="phone" type="tel"/>
</div>
<div class="form-group">
<label for="email">بريد إلكتروني</label>
<input class="form-input" id="email" required="" type="email"/>
</div>
<div class="form-group">
<label for="message">رسالة</label>
<textarea class="form-textarea" id="message" required="" style="resize: none; overflow: hidden; min-height: 120px;"></textarea>
</div>
<button class="glass-button ripple" style="width: 100%; padding: 14px; margin-top: 10px;" type="submit">أرسل رسالة</button>
<div style="display:none;"><label>اترك هذا الحقل فارغا</label><input id="honeypot" name="_honeypot" type="text"/></div>
