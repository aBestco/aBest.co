<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Contact | aBest.co</title>
    <!-- SEO & Open Graph Meta Tags -->
    <meta name="description" content="Contactieren Sie aBest.co.">

    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="/index.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="alternate" hreflang="en" href="https://abest.co/en/kontakt.html" />
    <link rel="alternate" hreflang="es" href="https://abest.co/es/kontakt.html" />
    <link rel="alternate" hreflang="de" href="https://abest.co/de/kontakt.html" />
    <link rel="alternate" hreflang="tr" href="https://abest.co/tr/kontakt.html" />
    <link rel="alternate" hreflang="x-default" href="https://abest.co/" />
</head>

<body>
    <!-- Background Layer -->
    <div class="background-wrapper">
        <img src="/bg_main_blurred_new.png" alt="Blurred Abstract City Background" class="main-bg" id="hero-bg">
        <div class="bg-gradient-overlay"></div>
    </div>

    <!-- Main App Container -->
    <div class="app-container">

        <!-- Mobile Navigation -->
        <nav class="mobile-nav" id="mobile-nav">
            <a href="index.html" class="nav-link">Home</a>
            <a href="impressum.html" class="nav-link">Imprint</a>
            <a href="datenschutz.html" class="nav-link">Privacy Policy</a>
            <a href="kontakt.html" class="nav-link">Contact</a>
        </nav>

        <!-- Header -->
        <header class="app-header fade-in-up" style="animation-delay: 0.1s;">
            <a href="index.html" class="logo-link">
                <span style="font-size: 1.5rem; font-weight: 500; letter-spacing: -0.5px; color: var(--text-main);">
                    <span style="color: var(--primary-blue);">a</span>Best<span style="color: var(--primary-blue);">.co</span>
                </span>
            </a>
            <div class="nav-icon" id="menu-btn" aria-label="Toggle Navigation Menu">
                <span></span>
                <span></span>
            </div>
        </header>

        <main class="scroll-content">
            <section class="section-spacing fade-in-up" style="animation-delay: 0.2s;">
                <div class="glass-panel text-center">
                    <h2>Contact</h2>
                    <div class="divider mt-2"></div>
                    <p style="margin-bottom: 1rem;">We welcome partnership and investment inquiries. Please fill out the
                        form below to contact us.</p>
                    <form id="contact-form" class="glass-form" onsubmit="handleContactSubmit(event)">
                        <div class="form-row" style="display: flex; gap: 1rem;">
                            <div class="form-group" style="flex: 1;">
                                <label for="first_name">First Name</label>
                                <input type="text" id="first_name" class="form-input" required>
                            </div>
                            <div class="form-group" style="flex: 1;">
                                <label for="last_name">Last Name</label>
                                <input type="text" id="last_name" class="form-input" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number (optional)</label>
                            <input type="tel" id="phone" class="form-input">
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" class="form-textarea" required style="resize: none; overflow: hidden; min-height: 120px;"></textarea>
                        </div>
                        <button type="submit" class="glass-button ripple"
                            style="width: 100%; padding: 14px; margin-top: 10px;">Send Message</button>
                    <div style="display:none;"><label>Leave this field empty</label><input type="text" name="_honeypot" id="honeypot"></div>
                    </form>
                </div>
            </section>
            <!-- Spacing for bottom scrolling on sticky mode -->
            
        </main>

        <footer class="app-footer fade-in-up" style="animation-delay: 0.8s;">
            <div class="slim-footer-content">
                <div class="footer-links">
                    <a href="impressum.html">Imprint</a>
                    <a href="datenschutz.html">Privacy Policy</a>
                    <a href="kontakt.html">Contact</a>
                </div>
                <div class="language-switcher">
                    <button class="lang-btn"
                        onclick="document.getElementById('lang-dropdown').classList.toggle('show')">EN ▾</button>
                    <div id="lang-dropdown" class="lang-dropdown">
                        <a href="/en/">EN - English</a>
                        <a href="/es/">ES - Español</a>
                        <a href="/de/">DE - Deutsch</a>
                        <a href="/tr/">TR - Türkçe</a>
                    </div>
                </div>
                <p class="copyright">&copy; 2026 aBest.co</p>
            </div>
        </footer>

        <!-- Modal Overlay -->
        <div class="modal-overlay" id="project-modal">
            <div class="modal-content">
                <button class="modal-close" id="modal-close">&times;</button>
                <div id="modal-body">
                    <!-- Content injected via JS -->
                </div>
            </div>
        </div>

    </div>
    <script src="/app.js"></script>
</body>

</html>
