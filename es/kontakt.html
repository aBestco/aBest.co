<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kontakt | aBest.co</title>
    <!-- SEO & Open Graph Meta Tags -->
    <meta name="description" content="Kontaktieren Sie aBest.co.">

    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="/index.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="alternate" hreflang="en" href="https://abest.co/en/kontakt.html" />
    <link rel="alternate" hreflang="es" href="https://abest.co/es/kontakt.html" />
    <link rel="alternate" hreflang="de" href="https://abest.co/de/kontakt.html" />
    <link rel="alternate" hreflang="tr" href="https://abest.co/tr/kontakt.html" />
    <link rel="alternate" hreflang="x-default" href="https://abest.co/" />
</head>

<body>
    <!-- Background Layer -->
    <div class="background-wrapper">
        <img src="/bg_main_blurred_new.png" alt="Blurred Abstract City Background" class="main-bg" id="hero-bg">
        <div class="bg-gradient-overlay"></div>
    </div>

    <!-- Main App Container -->
    <div class="app-container">

        <!-- Mobile Navigation -->
        <nav class="mobile-nav" id="mobile-nav">
            <a href="index.html" class="nav-link">Home</a>
            <a href="impressum.html" class="nav-link">Aviso Legal</a>
            <a href="datenschutz.html" class="nav-link">Privacidad</a>
            <a href="kontakt.html" class="nav-link">Kontakt</a>
        </nav>

        <!-- Header -->
        <header class="app-header fade-in-up" style="animation-delay: 0.1s;">
            <a href="index.html" class="logo-link">
                <span style="font-size: 1.5rem; font-weight: 500; letter-spacing: -0.5px; color: var(--text-main);">
                    aBest<span style="color: var(--primary-blue);">.co</span>
                </span>
            </a>
            <div class="language-switcher" style="position: relative; margin-right: 20px; display: inline-flex; align-items: center;">
                <button class="lang-btn" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-family: 'Outfit', sans-serif; font-size: 14px;" onclick="document.getElementById('lang-dropdown').classList.toggle('show')">ES ▾</button>
                <div id="lang-dropdown" class="lang-dropdown" style="display: none; position: absolute; top: 100%; right: 0; margin-top: 8px; background: rgba(20, 20, 30, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden; z-index: 100; min-width: 120px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                    <a href="/en/" style="display: block; padding: 10px 16px; color: white; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05);">EN - English</a>
                    <a href="/es/" style="display: block; padding: 10px 16px; color: white; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05);">ES - Español</a>
                    <a href="/de/" style="display: block; padding: 10px 16px; color: white; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05);">DE - Deutsch</a>
                    <a href="/tr/" style="display: block; padding: 10px 16px; color: white; text-decoration: none;">TR - Türkçe</a>
                </div>
            </div>
            <div class="nav-icon" id="menu-btn">
                <span></span>
                <span></span>
            </div>
        </header>

        <main class="scroll-content">
            <section class="section-spacing fade-in-up" style="animation-delay: 0.2s;">
                <div class="glass-panel text-center">
                    <h2>Kontakt</h2>
                    <div class="divider mt-2"></div>
                    <p style="margin-bottom: 2rem;">Wir freuen uns über partnerschaftliche und investitionsbezogene
                        Anfragen. Zögern Sie nicht, uns anzuschreiben.</p>
                    <a href="mailto:i@aBest.co" class="glass-button ripple"
                        style="text-decoration: none; display: inline-block; width: auto; padding: 16px 32px;">
                        eMail an: i@aBest.co
                    </a>
                </div>
            </section>
            <!-- Spacing for bottom scrolling on sticky mode -->
            <div style="height: 60px;"></div>
        </main>

        <footer class="app-footer fade-in-up" style="animation-delay: 0.8s;">
            <div class="slim-footer-content">
                <div class="footer-links">
                    <a href="impressum.html">Aviso Legal</a>
                    <a href="datenschutz.html">Privacidad</a>
                    <a href="kontakt.html">Kontakt</a>
                </div>
                <p class="copyright">&copy; 2026 aBest.co</p>
            </div>
        </footer>

        <!-- Modal Overlay -->
        <div class="modal-overlay" id="project-modal">
            <div class="modal-content">
                <button class="modal-close" id="modal-close">&times;</button>
                <div id="modal-body">
                    <!-- Content injected via JS -->
                </div>
            </div>
        </div>

    </div>
    <script src="/app.js"></script>
</body>

</html>
