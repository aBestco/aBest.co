<head>

<link href="/index.css" rel="stylesheet"/>

<style>
/* ── Dashboard Layout ──────────────────────────────────── */
body { background: #0a0a0f; }
.db-wrapper { min-height: 100vh; padding: 80px 16px 40px; max-width: 700px; margin: 0 auto; }

/* Hero card */
.db-hero { display: flex; align-items: center; gap: 20px; padding: 24px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.10); border-radius: 20px; margin-bottom: 20px; }
.db-avatar { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg,rgba(0,122,255,0.4),rgba(0,200,150,0.25)); border: 2px solid rgba(0,122,255,0.5); display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: 700; color: #fff; flex-shrink: 0; }
.db-hero-info h2 { font-size: 1.1rem; font-weight: 600; color: var(--text-main); margin: 0 0 4px; }
.db-hero-info p { font-size: 0.82rem; color: var(--text-muted); margin: 0 0 8px; }
.db-badge { display: inline-block; font-size: 0.7rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: rgba(0,122,255,0.15); border: 1px solid rgba(0,122,255,0.35); color: var(--primary-blue); text-transform: uppercase; letter-spacing: 0.06em; }
.db-badge.admin { background: rgba(255,165,0,0.15); border-color: rgba(255,165,0,0.4); color: #ffaa00; }

/* Tab Nav */
.db-tabs { display: flex; gap: 5px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09); border-radius: 14px; padding: 5px; margin-bottom: 16px; }
.db-tab { flex: 1; padding: 10px 6px; background: transparent; border: none; border-radius: 10px; color: var(--text-muted); font-size: 0.78rem; font-weight: 500; cursor: pointer; transition: all 0.2s; white-space: nowrap; font-family: inherit; }
.db-tab.active { background: rgba(0,122,255,0.15); border: 1px solid rgba(0,122,255,0.3); color: var(--primary-blue); }
.db-tab:hover:not(.active) { background: rgba(255,255,255,0.06); color: var(--text-main); }

/* Tab content */
.db-panel { display: none; }
.db-panel.active { display: block; }

/* Section header */
.db-section-header { margin-bottom: 20px; }
.db-section-header h3 { font-size: 1rem; font-weight: 600; color: var(--text-main); margin: 0 0 4px; }
.db-section-header p { font-size: 0.8rem; color: var(--text-muted); margin: 0; }

/* Form field */
.db-field { margin-bottom: 16px; }
.db-field label { display: block; margin-bottom: 6px; font-size: 0.82rem; color: var(--text-muted); font-weight: 500; }
.db-field input, .db-field select { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 11px 14px; color: var(--text-main); font-size: 0.9rem; font-family: inherit; outline: none; transition: border-color 0.2s; box-sizing: border-box; }
.db-field input:focus, .db-field select:focus { border-color: rgba(0,122,255,0.5); }
.db-field input[readonly] { opacity: 0.5; cursor: not-allowed; }
.db-field select { appearance: none; cursor: pointer; }
.db-field select option { background: #1a1a2e; color: #fff; }

/* Buttons */
.db-btn { width: 100%; padding: 13px; border: none; border-radius: 12px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; }
.db-btn-primary { background: rgba(0,122,255,0.2); border: 1px solid rgba(0,122,255,0.4); color: var(--primary-blue); }
.db-btn-primary:hover { background: rgba(0,122,255,0.3); }
.db-btn-admin { background: rgba(255,165,0,0.15); border: 1px solid rgba(255,165,0,0.4); color: #ffaa00; margin-top: 10px; }
.db-btn-danger { background: rgba(220,53,69,0.12); border: 1px solid rgba(220,53,69,0.35); color: #dc3545; margin-top: 8px; font-size: 0.85rem; }

/* Messages */
.msg-thread { max-height: 340px; overflow-y: auto; padding: 14px; background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; margin-bottom: 12px; }
.msg-bubble { margin-bottom: 12px; }
.msg-bubble.user { text-align: right; }
.msg-bubble .bubble-inner { display: inline-block; padding: 10px 14px; border-radius: 12px; max-width: 80%; text-align: left; font-size: 0.85rem; }
.msg-bubble.user .bubble-inner { background: rgba(0,122,255,0.25); border: 1px solid rgba(0,122,255,0.3); }
.msg-bubble.support .bubble-inner { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); }
.msg-bubble .bubble-meta { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 4px; }
.msg-input-row { display: flex; gap: 10px; }
.msg-input-row input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 11px 14px; color: var(--text-main); font-size: 0.88rem; font-family: inherit; outline: none; }
.msg-input-row input:focus { border-color: rgba(0,122,255,0.4); }
.msg-input-row button { padding: 11px 20px; background: rgba(0,122,255,0.2); border: 1px solid rgba(0,122,255,0.4); color: var(--primary-blue); border-radius: 10px; font-size: 0.88rem; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; }

/* Settings */
.settings-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.09); border-radius: 14px; padding: 20px; margin-bottom: 14px; }
.settings-card h4 { font-size: 0.88rem; font-weight: 600; color: var(--text-main); margin: 0 0 14px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.07); }
.danger-card { border-color: rgba(220,53,69,0.25); background: rgba(220,53,69,0.05); }
.danger-card h4 { color: #dc3545; }

/* Team tab */
.team-add-form { background: rgba(0,122,255,0.05); border: 1px solid rgba(0,122,255,0.15); border-radius: 14px; padding: 18px; margin-bottom: 20px; }
.team-add-form h4 { font-size: 0.88rem; font-weight: 600; color: var(--text-main); margin: 0 0 14px; }
.team-add-row { display: flex; gap: 10px; flex-wrap: wrap; }
.team-add-row .db-field { flex: 1; min-width: 160px; margin-bottom: 10px; }
.team-add-row .db-field:last-child { margin-bottom: 0; }
.team-add-btn { padding: 11px 22px; background: rgba(0,122,255,0.2); border: 1px solid rgba(0,122,255,0.4); color: var(--primary-blue); border-radius: 10px; font-size: 0.88rem; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; align-self: flex-end; margin-bottom: 10px; }
.team-add-btn:hover { background: rgba(0,122,255,0.3); }
.team-list { display: flex; flex-direction: column; gap: 10px; }
.team-member-card { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; }
.tm-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.95rem; font-weight: 700; color: #fff; flex-shrink: 0; }
.tm-info { flex: 1; min-width: 0; }
.tm-info .tm-email { font-size: 0.85rem; color: var(--text-main); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tm-info .tm-date { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }
.tm-role-badge { font-size: 0.72rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
.tm-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.tm-role-select { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; padding: 5px 8px; color: var(--text-main); font-size: 0.78rem; font-family: inherit; cursor: pointer; outline: none; }
.tm-role-select option { background: #1a1a2e; }
.tm-remove-btn { background: rgba(220,53,69,0.12); border: 1px solid rgba(220,53,69,0.25); color: #dc3545; border-radius: 8px; padding: 5px 10px; font-size: 0.75rem; cursor: pointer; font-family: inherit; white-space: nowrap; }
.tm-remove-btn:hover { background: rgba(220,53,69,0.22); }
.team-empty { text-align: center; padding: 30px; color: var(--text-muted); font-size: 0.85rem; border: 1px dashed rgba(255,255,255,0.12); border-radius: 12px; }

/* Logout */
.db-logout { text-align: center; margin-top: 28px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.07); }
.db-logout a { color: var(--text-muted); font-size: 0.85rem; text-decoration: none; padding: 6px 16px; border-radius: 8px; transition: all 0.2s; }
.db-logout a:hover { color: #dc3545; background: rgba(220,53,69,0.08); }

@media (max-width: 480px) {
  .db-hero { flex-direction: column; text-align: center; }
  .db-tab { font-size: 0.7rem; padding: 8px 4px; }
  .team-member-card { flex-wrap: wrap; }
  .tm-actions { width: 100%; justify-content: flex-end; }
}
/* Delete account link */
.db-delete-link { text-align: center; margin-top: 10px; }
.db-delete-link a { color: rgba(255,255,255,0.2); font-size: 0.75rem; text-decoration: none; transition: color 0.3s; }
.db-delete-link a:hover { color: #dc3545; }
</style>
</head>

<script>
const ROLE_COLORS = {
  'Assistant': '#007aff',
  'Accountant': '#34c759',
  'Marketing Manager': '#ff9500',
  'Team Member': '#5856d6',
  'Administrator': '#ff3b30',
  'Admin': '#ffaa00',
  'Superadmin': '#ff3b30',
};

function getRoleBg(role) {
  const c = ROLE_COLORS[role] || '#999';
  return `background:${c}22;border:1px solid ${c}66;color:${c};`;
}

function getInitials(str) {
  if (!str) return '?';
  return str.split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
}

function getAvatarBg(email) {
  const colors = ['#007aff','#34c759','#ff9500','#ff3b30','#5856d6','#00c896'];
  let h = 0;
  for (let i=0;i<email.length;i++) h=(h*31+email.charCodeAt(i))&0xffffffff;
  return colors[Math.abs(h)%colors.length];
}

// ── Tab switching ──────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.db-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.db-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'messages') loadMessages();
  if (name === 'team') loadTeamMembers();
}

// ── Profile save ──────────────────────────────────────
window.saveUserProfile = async function(event) {
  event.preventDefault();
  const token = localStorage.getItem('aBest_session');
  if (!token) return;
  const btn = document.getElementById('profile-save-btn');
  const orig = btn.innerText;
  btn.innerText = 'Сохранение...';
  btn.disabled = true;
  try {
    const res = await fetch('/api/auth/me', {
      method: 'PUT',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+token},
      body: JSON.stringify({
        name: document.getElementById('profile-name').value,
        phone: document.getElementById('profile-phone').value,
        company: document.getElementById('profile-company').value
      })
    });
    if (res.ok) { btn.innerText = '✓'; setTimeout(()=>{btn.innerText=orig;btn.disabled=false;},2000); }
    else { btn.innerText=orig; btn.disabled=false; }
  } catch(e) { btn.innerText=orig; btn.disabled=false; }
};

// ── Change Password ──────────────────────────────────
async function changePassword() {
  const token = localStorage.getItem('aBest_session');
  if (!token) return;
  const cur = document.getElementById('pw-current').value;
  const nw = document.getElementById('pw-new').value;
  const conf = document.getElementById('pw-confirm').value;
  if (!cur || !nw || nw !== conf) return;
  try {
    const res = await fetch('/api/auth/password', {
      method: 'PUT',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+token},
      body: JSON.stringify({currentPassword:cur, newPassword:nw})
    });
    if (res.ok) { ['pw-current','pw-new','pw-confirm'].forEach(id=>document.getElementById(id).value=''); }
    else { const d=await res.json(); alert(d.error||'Error'); }
  } catch(e) {}
}

// ── Load messages ─────────────────────────────────────
window.loadMessages = async function() {
  const token = localStorage.getItem('aBest_session');
  if (!token) return;
  const thread = document.getElementById('message-thread');
  try {
    const res = await fetch('/api/messages', {headers:{'Authorization':'Bearer '+token}});
    if (!res.ok) throw new Error();
    const msgs = await res.json();
    if (!msgs.length) {
      thread.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:30px 0;font-size:0.85rem;">Нет сообщений. Напишите нам!</div>';
      return;
    }
    thread.innerHTML = msgs.map(m => {
      const isUser = m.sender === 'user';
      const cls = isUser ? 'user' : 'support';
      const who = isUser ? 'Вы' : 'aBest.co';
      const date = new Date(m.timestamp).toLocaleString();
      return `<div class="msg-bubble ${cls}"><div class="bubble-inner"><div class="bubble-meta">${who} · ${date}</div>${m.text}</div></div>`;
    }).join('');
    thread.scrollTop = thread.scrollHeight;
  } catch(e) {
    thread.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:20px;">Нет сообщений. Напишите нам!</div>';
  }
};

// ── Send message ──────────────────────────────────────
window.sendMessage = async function() {
  const token = localStorage.getItem('aBest_session');
  const input = document.getElementById('new-message-input');
  const btn = document.getElementById('send-message-btn');
  if (!token || !input.value.trim()) return;
  const text = input.value.trim();
  btn.disabled = true;
  try {
    const res = await fetch('/api/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body: JSON.stringify({text})
    });
    if (res.ok) { input.value=''; loadMessages(); }
  } catch(e) {} finally { btn.disabled=false; }
};

// ── TEAM MANAGEMENT ───────────────────────────────────
async function loadTeamMembers() {
  const token = localStorage.getItem('aBest_session');
  if (!token) return;
  const list = document.getElementById('team-member-list');
  try {
    const res = await fetch('/api/team', {headers:{'Authorization':'Bearer '+token}});
    if (!res.ok) throw new Error();
    const members = await res.json();
    renderTeamList(members);
  } catch(e) {
    list.innerHTML = '<div class="team-empty">Нет участников команды.</div>';
  }
}

function renderTeamList(members) {
  const list = document.getElementById('team-member-list');
  if (!members.length) {
    list.innerHTML = '<div class="team-empty">Нет участников команды.</div>';
    return;
  }
  const ROLES = ['Assistant', 'Accountant', 'Marketing Manager', 'Team Member', 'Administrator'];
  list.innerHTML = members.map(m => {
    const initials = getInitials(m.name || m.email);
    const bgColor = getAvatarBg(m.email);
    const date = m.addedAt ? new Date(m.addedAt).toLocaleDateString() : '';
    const roleOpts = ROLES.map(r => `<option value="${r}"${r===m.role?' selected':''}>${r}</option>`).join('');
    return `
    <div class="team-member-card" id="tm-${btoa(m.email).replace(/=/g,'')}">
      <div class="tm-avatar" style="background:${bgColor}44;border:2px solid ${bgColor}88;">${initials}</div>
      <div class="tm-info">
        <div class="tm-email">${m.email}</div>
        <div class="tm-date">Добавлен: ${date}</div>
      </div>
      <div class="tm-actions">
        <select class="tm-role-select" onchange="updateTeamRole('${m.email}', this.value)">${roleOpts}</select>
        <button class="tm-remove-btn" onclick="removeTeamMember('${m.email}')">Удалить</button>
      </div>
    </div>`;
  }).join('');
}

async function addTeamMember() {
  const token = localStorage.getItem('aBest_session');
  if (!token) return;
  const email = document.getElementById('team-new-email').value.trim();
  const role = document.getElementById('team-new-role').value;
  const errDiv = document.getElementById('team-add-error');
  errDiv.style.display = 'none';

  if (!email || !role) {
    errDiv.textContent = 'Email и роль обязательны.';
    errDiv.style.display = 'block';
    return;
  }
  try {
    const res = await fetch('/api/team', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+token},
      body: JSON.stringify({email, role})
    });
    const data = await res.json();
    if (res.ok) {
      document.getElementById('team-new-email').value = '';
      document.getElementById('team-new-role').value = '';
      loadTeamMembers();
    } else {
      errDiv.textContent = data.error === 'Already in team' ? 'Этот пользователь уже в команде.' : (data.error || 'Error');
      errDiv.style.display = 'block';
    }
  } catch(e) { errDiv.textContent = 'Error'; errDiv.style.display = 'block'; }
}

async function updateTeamRole(email, role) {
  const token = localStorage.getItem('aBest_session');
  if (!token) return;
  await fetch(`/api/team/${encodeURIComponent(email)}`, {
    method: 'PUT',
    headers: {'Content-Type':'application/json','Authorization':'Bearer '+token},
    body: JSON.stringify({role})
  });
}

async function removeTeamMember(email) {
  const token = localStorage.getItem('aBest_session');
  if (!token) return;
  const res = await fetch(`/api/team/${encodeURIComponent(email)}`, {
    method: 'DELETE',
    headers: {'Authorization':'Bearer '+token}
  });
  if (res.ok) loadTeamMembers();
}

// ── Enter key for message input ───────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('new-message-input');
  if (inp) inp.addEventListener('keydown', e => { if(e.key==='Enter') sendMessage(); });
});
// ── Delete account (two-step confirm) ─────────────────
async function confirmDeleteAccount() {
  const token = localStorage.getItem('aBest_session');
  if (!token) return;
  const userEmail = document.getElementById('profile-email').value || '';
  const input = prompt('Введите ваш email для подтверждения:');
  if (!input) return;
  if (input.trim().toLowerCase() !== userEmail.trim().toLowerCase()) {
    alert('Email не совпадает. Отменено.');
    return;
  }
  alert('Please contact support@abest.co to complete account deletion.');
}
