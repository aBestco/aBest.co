# aBest.co – Cloudflare Pages + Workers Configuration
# ─────────────────────────────────────────────────────
# Account: 23a6b5565d032e6bf1ffee7931c279cc
# Project: abest-co
# ─────────────────────────────────────────────────────

name = "abest-co"
compatibility_date = "2026-03-05"
pages_build_output_dir = "."

# ─── KV NAMESPACES ───────────────────────────────────
# Bound in Cloudflare Dashboard:
# Pages → abest-co → Settings → Bindings

[[kv_namespaces]]
binding = "ABEST_AUTH"
id = "29270c717ba74ef8a7f71be7a20add4e"
# Stores: user passwords, sessions, profiles, messages, team members, role data

[[kv_namespaces]]
binding = "ABEST_INQUIRIES"
id = "9d4a94e280134e1abfcceb16568db8bd"
# Stores: contact form submissions, business inquiries

# ─── R2 BUCKETS ──────────────────────────────────────
# NOTE: R2 binding is configured in Cloudflare Dashboard (not here).
# Pages → abest-co → Settings → Bindings → Add R2 binding
# Binding name: ABEST_R2 / Bucket: abest-uploads
# (Activate R2 in dashboard first, then create bucket & add binding)

# ─── ENVIRONMENT VARIABLES ───────────────────────────
# Set as encrypted secrets in Cloudflare Dashboard:
# Pages → abest-co → Settings → Environment variables
#
# Required variables:
#   ADMIN_USER   = admin email address
#   ADMIN_PASS   = admin password (hashed)
#
# The worker checks these for the legacy admin basic-auth endpoint.
