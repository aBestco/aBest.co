<main class="scroll-content">
<section class="section-spacing fade-in-up" style="animation-delay: 0.2s;">
<div class="glass-panel text-center">
<h2>Contato</h2>
<div class="divider mt-2"></div>
<p style="margin-bottom: 1rem;">Aceitamos consultas de parceria e investimento. Por favor preencha o
                        formulário abaixo para entrar em contato conosco.</p>
<form class="glass-form" id="contact-form" onsubmit="handleContactSubmit(event)">
<div class="form-row" style="display: flex; gap: 1rem;">
<div class="form-group" style="flex: 1;">
<label for="first_name">Primeiro nome</label>
<input class="form-input" id="first_name" required="" type="text"/>
</div>
<div class="form-group" style="flex: 1;">
<label for="last_name">Sobrenome</label>
<input class="form-input" id="last_name" required="" type="text"/>
</div>
</div>
<div class="form-group">
<label for="phone">Número de telefone (opcional)</label>
<input class="form-input" id="phone" type="tel"/>
</div>
<div class="form-group">
<label for="email">E-mail</label>
<input class="form-input" id="email" required="" type="email"/>
</div>
<div class="form-group">
<label for="message">Mensagem</label>
<textarea class="form-textarea" id="message" required="" style="resize: none; overflow: hidden; min-height: 120px;"></textarea>
</div>
<button class="glass-button ripple" style="width: 100%; padding: 14px; margin-top: 10px;" type="submit">Enviar mensagem</button>
<div style="display:none;"><label>Deixe este campo vazio</label><input id="honeypot" name="_honeypot" type="text"/></div>
</form>
</div>
</section>
